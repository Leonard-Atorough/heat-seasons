[build]
  command = "npm run build -w shared && npm run build -w frontend"
  publish = "packages/frontend/dist"
  base = "/"

[build.environment]
  NODE_ENV = ""

# API proxy: forward /api/* to the Railway backend so cookies are same-site.
# This must come before the SPA catch-all below.
[[redirects]]
  from = "/api/*"
  to = "https://heat-seasons.up.railway.app/api/:splat"
  status = 200
  force = true

# SPA Routing: redirect all non-file routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
