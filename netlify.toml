[build]
  command = "npm run build:frontend"
  publish = "packages/frontend/dist"
  base = "/"
  environment = { NODE_VERSION = "22", NODE_ENV = "production", VITE_API_URL = "$VITE_API_URL" }

# SPA Routing: redirect all non-file routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
